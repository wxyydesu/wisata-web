; PHP-FPM Configuration untuk Laravel
; File: /etc/php/8.2/fpm/pool.d/www.conf

[www]

; Unix user/group yang akan menjalankan processes
user = www-data
group = www-data

; Listen pada Unix socket (recommended untuk Nginx)
listen = /run/php/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0666

; Process manager configuration
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500
pm.max_requests_grace_period = 30s

; Timeout settings
request_terminate_timeout = 300s
request_slowlog_timeout = 5s

; Log configuration
access.log = /var/log/php-fpm/access.log
access.format = "%R - %u %t \"%m %r%Q%q\" %s %{mili}dms %{kilo}M %C%%"
slowlog = /var/log/php-fpm/slow.log

; Security
catch_workers_output = yes
decorate_workers_output = yes

; Environment variables
env[LARAVEL_ENV] = production
env[APP_ENV] = production

; Additional PHP settings yang bisa di-override di sini
php_admin_value[upload_max_filesize] = 100M
php_admin_value[post_max_size] = 100M
php_admin_value[memory_limit] = 512M
php_admin_value[max_execution_time] = 300
php_admin_value[max_input_time] = 300
php_admin_value[display_errors] = Off
php_admin_value[log_errors] = On
php_admin_value[error_log] = /var/log/php-fpm/error.log

; OPcache configuration
php_admin_value[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 256
php_admin_value[opcache.interned_strings_buffer] = 16
php_admin_value[opcache.max_accelerated_files] = 10000
php_admin_value[opcache.validate_timestamps] = 0
php_admin_value[opcache.revalidate_freq] = 0
php_admin_value[opcache.file_cache] = /var/cache/php-fpm-opcache
php_admin_value[opcache.file_cache_only] = 0

; realpath cache
php_admin_value[realpath_cache_size] = 4096K
php_admin_value[realpath_cache_ttl] = 600
