# Cloudflare Tunnel Configuration
# File: ~/.cloudflared/config.yml
# Location: /root/.cloudflared/config.yml atau ~/.cloudflared/config.yml

# Tunnel identifier
tunnel: wisata-web

# Path ke credentials file (dapatkan setelah jalankan: cloudflared tunnel login)
credentials-file: ~/.cloudflared/YOUR-TUNNEL-ID.json

# Logging
log-level: info
log-directory: /var/log/cloudflared

# Metrics & monitoring
metrics: 0.0.0.0:8080

# Connection settings
max-update-frequency: 24h
disable-queue: false

# Ingress rules - definisikan service yang ingin di-expose
ingress:
  # Main website
  - hostname: wisata.yourdomain.com
    service: http://localhost:80
    originRequest:
      httpHostHeader: wisata.yourdomain.com
      noTLSVerify: true
      keepAliveConnections: 100
      keepAliveTimeout: 90s
      connectTimeout: 30s
      tlsTimeout: 10s
      tcpKeepAlive: 30s
  
  # API endpoint (jika dipisah)
  - hostname: api.wisata.yourdomain.com
    service: http://localhost:80
    originRequest:
      httpHostHeader: api.wisata.yourdomain.com
      noTLSVerify: true
  
  # Admin panel (jika ada)
  - hostname: admin.wisata.yourdomain.com
    service: http://localhost:80
    originRequest:
      httpHostHeader: admin.wisata.yourdomain.com
      noTLSVerify: true
  
  # WWW redirect
  - hostname: www.wisata.yourdomain.com
    service: http://localhost:80
    originRequest:
      httpHostHeader: www.wisata.yourdomain.com
      noTLSVerify: true
  
  # Default catch-all (untuk domain lain/error)
  - service: http_status:404


# ===================================
# CLOUDFLARE DASHBOARD CONFIGURATION
# ===================================
# 
# 1. DNS SETTINGS:
#    Type: CNAME
#    Name: wisata
#    Target: <tunnel-uuid>.cfargotunnel.com
#    Proxy status: Proxied (orange cloud)
#
# 2. SSL/TLS SETTINGS:
#    - SSL/TLS encryption mode: Full (Strict recommended)
#    - Automatic HTTPS rewrites: ON
#    - Always use HTTPS: ON
#    - TLS 1.3: ON
#
# 3. SECURITY SETTINGS:
#    - WAF: Enabled
#    - DDoS Protection: ON
#    - Bot Management: ON (optional)
#    - Access Policies: Configure as needed
#
# 4. PERFORMANCE:
#    - Caching Level: Cache Everything
#    - Browser Cache TTL: 30 minutes
#    - Edge TTL: 4 hours
#    - Rocket Loader: ON
#    - Minify: CSS, JavaScript, HTML
#
# 5. RULES (Page Rules):
#    - /storage/* -> Cache Level: Bypass
#    - /api/* -> Cache Level: Bypass
#    - *.png, *.jpg, *.css, *.js -> Cache Level: Cache Everything


