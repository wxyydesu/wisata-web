user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 768;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    types_hash_bucket_size 64;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ========================
    # CLOUDFLARE TUNNEL CONFIG
    # ========================
    upstream php_backend {
        server unix:/run/php/php-fpm.sock;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        
        server_name _;
        root /var/www/wisata-web/public;

        # Cloudflare trusted IPs
        set_real_ip_from 103.21.244.0/22;
        set_real_ip_from 103.22.200.0/22;
        set_real_ip_from 103.31.4.0/22;
        set_real_ip_from 104.16.0.0/12;
        set_real_ip_from 108.162.192.0/18;
        set_real_ip_from 131.0.72.0/22;
        set_real_ip_from 141.101.64.0/18;
        set_real_ip_from 162.158.0.0/15;
        set_real_ip_from 172.64.0.0/13;
        set_real_ip_from 173.245.48.0/20;
        set_real_ip_from 188.114.96.0/20;
        set_real_ip_from 190.93.240.0/20;
        set_real_ip_from 197.234.240.0/22;
        set_real_ip_from 198.41.128.0/17;
        set_real_ip_from 202.182.224.0/20;
        set_real_ip_from 2400:cb00::/32;
        set_real_ip_from 2606:4700::/32;
        set_real_ip_from 2803:f800::/32;
        set_real_ip_from 2405:b500::/32;
        set_real_ip_from 2405:8100::/32;
        set_real_ip_from 2c0f:f248::/32;
        set_real_ip_from 2a06:98c0::/29;

        real_ip_header CF-Connecting-IP;
        real_ip_recursive on;

        # Index files
        index index.php index.html index.htm;

        # Charset
        charset utf-8;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Hide nginx version
        server_tokens off;

        # Deny access to sensitive files
        location ~ /\.(?!well-known).* {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ /\.git {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Deny access to storage and bootstrap
        location ~ /storage {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ /bootstrap {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Cache static files
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            log_not_found off;
        }

        # Prevent access to hidden files except .well-known
        location ~ /\. {
            if ($request_uri !~ ^/\.well-known/) {
                deny all;
            }
        }

        # Laravel front controller
        location / {
            limit_req zone=general burst=20 nodelay;
            
            try_files $uri $uri/ /index.php?$query_string;
        }

        # API rate limiting (optional - adjust as needed)
        location ~ ^/api/ {
            limit_req zone=api burst=50 nodelay;
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Pass PHP to PHP-FPM
        location ~ \.php$ {
            # Prevent arbitrary PHP execution
            if (!-f $document_root$fastcgi_script_name) {
                return 404;
            }

            fastcgi_pass php_backend;
            fastcgi_index index.php;
            
            # Standard FastCGI parameters
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PHP_VALUE "upload_max_filesize=100M \n post_max_size=100M";
            include fastcgi_params;

            # FastCGI optimization
            fastcgi_buffer_size 128k;
            fastcgi_buffers 256 16k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_max_temp_file_size 0;
            fastcgi_connect_timeout 300s;
            fastcgi_send_timeout 300s;
            fastcgi_read_timeout 300s;
        }

        # Deny execution of scripts in upload directory
        location /storage/uploads {
            location ~ \.php$ {
                deny all;
            }
        }

        # Status page (restricted to localhost only)
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow ::1;
            deny all;
        }
    }

    # ========================
    # HTTPS CONFIG (Optional)
    # ========================
    # Uncomment this if you want HTTPS termination at Nginx
    # Note: With Cloudflare Tunnel, you typically don't need this
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name wisata-domain.com;
    #     
    #     ssl_certificate /etc/letsencrypt/live/wisata-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/wisata-domain.com/privkey.pem;
    #     
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #     
    #     # Redirect HTTP to HTTPS
    #     # (handled by Cloudflare when using tunnel)
    # }

    # ========================
    # REDIRECT HTTP TO HTTPS
    # ========================
    server {
        listen 80;
        listen [::]:80;
        server_name wisata-domain.com www.wisata-domain.com;

        # Redirect all HTTP to HTTPS (Cloudflare will handle)
        return 301 https://$server_name$request_uri;
    }
}
